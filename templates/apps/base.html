

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
      <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    {% block cod_css %}
    {% endblock %}
</head>
<body>


  <!-- HEADER -->
  <header class="bg-[#002f34] text-white">
    <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">

      <div class="flex items-center gap-8">
        <div class="text-3xl font-black tracking-tighter cursor-pointer">
          <a href="{% url 'main_page' %}">OLX</a>
        </div>
      </div>

      <div class="flex items-center gap-4 md:gap-6">
        <div class="flex items-center text-sm font-bold border-r border-gray-600 pr-4 h-5">
          <span class="cursor-pointer hover:underline">O'Z</span>
          <span class="mx-2 text-gray-500">|</span>
          <span class="cursor-pointer text-gray-400 hover:text-white">Рус</span>
        </div>

        <div class="flex items-center gap-2 cursor-pointer hover:text-cyan-400">
          <i class="fa-regular fa-comment text-xl"></i>
          <span class="hidden lg:inline font-semibold text-sm">Чат</span>
        </div>

        <div class="flex items-center cursor-pointer hover:text-cyan-400">
          <a {% if user.is_authenticated %}
              href="{% url 'favorites_page' %}"
            {% else %}
              href="{% url 'login_page' %}"
            {% endif %} > <i class="fa-regular fa-heart text-xl"></i> </a>
        </div>

        <div class="flex items-center cursor-pointer hover:text-cyan-400">
          <i class="fa-regular fa-bell text-xl"></i>
        </div>

        <!-- Профиль: если залогинен -> profile_page, иначе -> login_page -->
        <div class="flex items-center">
          <a
            {% if user.is_authenticated %}
              href="{% url 'profile_page' %}"
            {% else %}
              href="{% url 'login_page' %}"
            {% endif %}
            class="flex items-center gap-2 font-semibold text-sm transition-colors hover:text-cyan-400"
          >
            <i class="fa-regular fa-user text-xl"></i>
            <span class="hidden md:inline">Профиль</span>
          </a>
        </div>

        <button class="bg-white text-[#002f34] px-4 py-2 rounded font-bold hover:bg-gray-100 transition text-sm">
           <a href="{%   url "add_announcement_page" %}" >Подать объявление</a>
        </button>

        {% if user.is_authenticated %}
          <a href="{% url 'logout_page' %}"
             class="flex items-center gap-2 font-semibold text-sm transition-colors hover:text-cyan-400">
            <span class="hidden md:inline">Logout</span>
          </a>
        {% endif %}
      </div>
    </div>
  </header>

  {% block cod_html %}
            {% endblock %}


  {% block cod_js %}{% endblock %}
</body>
</html>
